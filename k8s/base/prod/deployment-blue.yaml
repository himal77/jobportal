apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobportal-blue
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jobportal
      version: blue
  template:
    metadata:
      labels:
        app: jobportal
        version: blue
    spec:
      containers:
        - name: jobportal
          image: himal77/jobportal
          imagePullPolicy: Always
          ports:
            - containerPort: 8080