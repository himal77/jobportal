apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobportal
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jobportal
  template:
    metadata:
      labels:
        app: jobportal
    spec:
      containers:
        - name: jobportal
          image: himal77/jobportal:dd14d9436e3c93fc103ac65f915982bf796716f8
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: '256Mi'
              cpu: '250m'
            limits:
              memory: '512Mi'
              cpu: '500m'
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
