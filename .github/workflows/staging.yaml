name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. 4.1.1)'
        required: true

env:
  DOCKER_IMAGE: himal77/jobportal

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging       # ← manual approval gate
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Update staging image tag
        run: |
          sed -i "s|newTag:.*|newTag: \"${{ github.event.inputs.version }}\"|" k8s/overlays/staging/kustomization.yaml

      - name: Commit and push
        run: |
          git config user.email 'ci@github.com'
          git config user.name 'GitHub Actions'
          git add k8s/overlays/staging/kustomization.yaml
          git commit -m "ci: deploy ${{ github.event.inputs.version }} to staging [skip ci]"
          git push origin HEAD:main