name: Deploy Staging

on:
  push:
    branches: [ staging ]
    paths-ignore:
      - 'k8s/overlays/staging/**'   # ← avoid double trigger on kustomize commit

env:
  DOCKER_IMAGE: himal77/jobportal

jobs:
  build-deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - run: mvn clean package -DskipTests

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          docker build -t $DOCKER_IMAGE:$VERSION .
          docker push $DOCKER_IMAGE:$VERSION

      - name: Update staging kustomization
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s|newTag:.*|newTag: \"$VERSION\"|" k8s/overlays/staging/kustomization.yaml
          git config user.email 'ci@github.com'
          git config user.name 'GitHub Actions'
          git add k8s/overlays/staging/kustomization.yaml
          git commit -m "chore: deploy ${{ steps.version.outputs.VERSION }} to staging [skip ci]"
          git push origin staging