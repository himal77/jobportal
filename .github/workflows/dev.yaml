name: Deploy Dev

on:
  push:
    tags:
      - 'v*.*.*'    # ← only triggers on tag push

env:
  DOCKER_IMAGE: himal77/jobportal

jobs:
  build-deploy-dev:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: dev
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}   # ← strips "refs/tags/v" from "refs/tags/v1.0.1"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - run: mvn clean package -DskipTests

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          docker build -t $DOCKER_IMAGE:$VERSION .
          docker push $DOCKER_IMAGE:$VERSION

      - name: Update dev kustomization
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s|newTag:.*|newTag: \"$VERSION\"|" k8s/overlays/dev/kustomization.yaml
          git config user.email 'ci@github.com'
          git config user.name 'GitHub Actions'
          git add k8s/overlays/dev/kustomization.yaml
          git commit -m "chore: deploy ${{ steps.version.outputs.VERSION }} to dev [skip ci]"
          git push origin dev