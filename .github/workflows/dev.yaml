name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'    # ← only triggers on tag push

env:
  DOCKER_IMAGE: himal77/jobportal

jobs:
  # ─── Job 1: Docker ───────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: main                        # ← checkout main branch not the tag
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - run: mvn clean package -DskipTests

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          docker build -t $DOCKER_IMAGE:$VERSION .
          docker tag $DOCKER_IMAGE:$VERSION $DOCKER_IMAGE:latest
          docker push $DOCKER_IMAGE:$VERSION
          docker push $DOCKER_IMAGE:latest

    # ─── Job 2: Deploy to Dev (automatic) ────────────────────────────────────
  deploy-dev:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Update dev image tag
        run: |
          VERSION=${{ needs.docker.outputs.version }}
          sed -i "s|newTag:.*|newTag: \"$VERSION\"|" k8s/overlays/dev/kustomization.yaml

      - name: Commit and push
        run: |
          git config user.email 'ci@github.com'
          git config user.name 'GitHub Actions'
          git add k8s/overlays/dev/kustomization.yaml
          git commit -m "ci: deploy ${{ needs.docker.outputs.version }} to dev [skip ci]"
          git push origin HEAD:main