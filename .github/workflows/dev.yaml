name: Deploy Dev

on:
  push:
    tags:
      - 'v*.*.*'    # ← only triggers on tag push

env:
  DOCKER_IMAGE: himal77/jobportal

jobs:
  build-deploy-dev:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: dev
          fetch-depth: 0

      - name: Set short SHA version
        id: version
        run: echo "VERSION=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - run: mvn clean package -DskipTests

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          docker build -t $DOCKER_IMAGE:$VERSION .
          docker push $DOCKER_IMAGE:$VERSION

      - name: Update dev kustomization
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          sed -i "s|newTag:.*|newTag: \"$VERSION\"|" k8s/overlays/dev/kustomization.yaml
          git config user.email 'ci@github.com'
          git config user.name 'GitHub Actions'
          git add k8s/overlays/dev/kustomization.yaml
          git commit -m "chore: deploy ${{ steps.version.outputs.VERSION }} to dev [skip ci]"
          git push origin dev

  # ── auto merge dev to staging after success ──────────────────────────────
  promote-to-staging:
    needs: build-deploy-dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Merge dev into staging
        run: |
          git config user.email 'ci@github.com'
          git config user.name 'GitHub Actions'
          git fetch origin
          git checkout staging
          git merge origin/dev --no-ff -m "chore: auto promote dev to staging [skip ci]"
          git push origin staging