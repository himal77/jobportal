name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Fetch all branches
        run: git fetch --all

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install dependencies
        run: npm install -g @changesets/cli

      - name: Create Release PR or GitHub Release
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: npx changeset tag
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Sync version to pom.xml
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false

      - name: Commit pom.xml if changed
        run: |
          git config user.email 'ci@github.com'
          git config user.name 'GitHub Actions'
          git add pom.xml
          git diff --staged --quiet && echo "no changes" || git commit -m "chore: sync pom.xml to ${{ env.VERSION }} [skip ci]"

      - name: Tag and push
        run: |
          VERSION=${{ env.VERSION }}
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, skipping"
          else
            echo "Creating tag v$VERSION"
            git tag v$VERSION
            git push origin main --follow-tags
          fi