name: Release

on:
  push:
    branches: [dev]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Fetch all branches
        run: git fetch --all

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install dependencies
        run: npm install -g @changesets/cli

      - name: Create Release PR or GitHub Release
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: npx changeset tag
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Sync version to pom.xml
        if: steps.changesets.outputs.published == 'true'   # ← only when release PR is merged
        run: |
          # get version from package.json (changesets updates this)
          VERSION=$(node -p "require('./package.json').version")
          echo "Syncing version $VERSION to pom.xml"
          
          # update pom.xml version
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false
          
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Commit pom.xml version bump
        if: steps.changesets.outputs.published == 'true'
        run: |
          git config user.email 'ci@github.com'
          git config user.name 'GitHub Actions'
          git add pom.xml
          git diff --staged --quiet || git commit -m "chore: bump pom.xml to ${{ env.VERSION }} [skip ci]"
          git push origin dev