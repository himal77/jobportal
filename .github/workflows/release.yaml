name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Fetch all branches
        run: git fetch --all

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install dependencies
        run: npm install -g @changesets/cli

      - name: Create Release PR or GitHub Release
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: npx changeset tag
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Sync pom.xml version from package.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Syncing version $VERSION to pom.xml"

          # update pom.xml
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false

          # verify it worked
          echo "pom.xml version is now:"
          mvn help:evaluate -Dexpression=project.version -q -DforceStdout

      - name: Commit and tag
        run: |
          VERSION=${{ env.VERSION }}
          git config user.email 'ci@github.com'
          git config user.name 'GitHub Actions'

          # commit pom.xml change
          git add pom.xml
          git diff --staged --quiet && echo "pom.xml unchanged" || git commit -m "chore: sync pom.xml to $VERSION [skip ci]"

          # push commits first
          git push origin main