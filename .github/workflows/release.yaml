name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Fetch all branches
        run: git fetch --all

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install dependencies
        run: npm install -g @changesets/cli

      - name: Create Release PR or GitHub Release
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: npx changeset tag
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Check if changeset exists
        id: check
        run: |
          if [ -n "$(ls .changeset/*.md 2>/dev/null | grep -v README)" ]; then
            echo "HAS_CHANGESET=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_CHANGESET=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Version bump and push
        if: steps.check.outputs.HAS_CHANGESET == 'true'
        run: |
          changeset version
          VERSION=$(node -p "require('./package.json').version")
          git config user.email 'ci@github.com'
          git config user.name 'GitHub Actions'
          git add .
          git commit -m "chore: release $VERSION [skip ci]"
          git tag v$VERSION
          git push origin main --follow-tags

      - name: Sync version to pom.xml       # ← runs after version bump
        if: steps.check.outputs.HAS_CHANGESET == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          mvn versions:set -DnewVersion=$VERSION -DgenerateBackupPoms=false

      - name: Commit pom.xml version bump
        if: steps.check.outputs.HAS_CHANGESET == 'true'
        run: |
          git add pom.xml
          git diff --staged --quiet || git commit -m "chore: bump pom.xml to ${{ env.VERSION }} [skip ci]"
          git push origin main