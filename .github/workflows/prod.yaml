name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy (e.g. 4.1.1)'
        required: true

env:
  DOCKER_IMAGE: himal77/jobportal

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: prod       # ← manual approval gate
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags

      - name: Validate version exists as git tag
        run: |
          VERSION=${{ github.event.inputs.version }}
          if ! git tag | grep -q "^v$VERSION$"; then
            echo "❌ Tag v$VERSION does not exist. Available tags:"
            git tag | sort -V | tail -10    # ← shows last 10 tags
            exit 1
          fi
          echo "✅ Tag v$VERSION exists"

      - name: Update prod image tag
        run: |
          sed -i "s|newTag:.*|newTag: \"${{ github.event.inputs.version }}\"|" k8s/overlays/prod/kustomization.yaml

      - name: Commit and push
        run: |
          git config user.email 'ci@github.com'
          git config user.name 'GitHub Actions'
          git add k8s/overlays/prod/kustomization.yaml
          git commit -m "ci: deploy ${{ github.event.inputs.version }} to staging [skip ci]"
          git push origin HEAD:main