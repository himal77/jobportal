name: Deploy

on:
  push:
    tags:
      - 'v*.*.*'    # ← only triggers on tag push

env:
  DOCKER_IMAGE: himal77/jobportal

jobs:
  # ─── Job 1: Docker ───────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: main                        # ← checkout main branch not the tag
          fetch-depth: 0

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - run: mvn clean package -DskipTests

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          docker build -t $DOCKER_IMAGE:$VERSION .
          docker tag $DOCKER_IMAGE:$VERSION $DOCKER_IMAGE:latest
          docker push $DOCKER_IMAGE:$VERSION
          docker push $DOCKER_IMAGE:latest

  # ─── Job 2: Deploy ───────────────────────────────────────────────────────
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Detect active color and switch
        id: switch
        run: |
          CURRENT=$(grep 'version:' k8s/service.yaml | awk '{print $2}')
          if [ "$CURRENT" = "blue" ]; then
            NEW_COLOR="green"
            STANDBY_COLOR="blue"
          else
            NEW_COLOR="blue"
            STANDBY_COLOR="green"
          fi
          echo "NEW_COLOR=$NEW_COLOR" >> $GITHUB_OUTPUT
          echo "STANDBY_COLOR=$STANDBY_COLOR" >> $GITHUB_OUTPUT

      - name: Update new color with latest image
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          NEW_COLOR=${{ steps.switch.outputs.NEW_COLOR }}
          sed -i 's|image:.*|image: '$DOCKER_IMAGE:$VERSION'|' k8s/deployment-$NEW_COLOR.yaml

      - name: Switch service to new color
        run: |
          NEW_COLOR=${{ steps.switch.outputs.NEW_COLOR }}
          sed -i "s|version:.*|version: $NEW_COLOR|" k8s/service.yaml

      - name: Commit and push
        run: |
          git config user.email 'ci@github.com'
          git config user.name 'GitHub Actions'
          git add k8s/
          git commit -m "ci: switch to ${{ steps.switch.outputs.NEW_COLOR }} ${{ steps.version.outputs.VERSION }} [skip ci]"
          git push origin main